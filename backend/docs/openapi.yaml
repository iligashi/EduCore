openapi: 3.0.3
info:
  title: EduCore LMS & DMS API
  version: 1.0.0
  description: REST API for authentication, DMS records, LMS content, reports, realtime notifications, CMS, search, and import/export.
servers:
  - url: http://localhost:4000/api
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /auth/register:
    post:
      security: []
      summary: Register a user and optional role profile.
      responses:
        "201":
          description: Created session
  /auth/login:
    post:
      security: []
      summary: Login with email and password.
      responses:
        "200":
          description: Authenticated session
  /auth/refresh:
    post:
      security: []
      summary: Rotate refresh token and issue a new access token.
      responses:
        "200":
          description: Refreshed session
  /auth/me:
    get:
      summary: Return the authenticated user.
      responses:
        "200":
          description: Current user
  /users:
    get:
      summary: List users. Admin only.
      responses:
        "200":
          description: User list
    post:
      summary: Create a user. Admin only.
      responses:
        "201":
          description: Created user
  /students:
    get:
      summary: List students.
      responses:
        "200":
          description: Student list
    post:
      summary: Create a student and linked user. Admin only.
      responses:
        "201":
          description: Created student
  /instructors:
    get:
      summary: List instructors.
      responses:
        "200":
          description: Instructor list
    post:
      summary: Create an instructor and linked user. Admin only.
      responses:
        "201":
          description: Created instructor
  /courses:
    get:
      summary: List visible courses.
      responses:
        "200":
          description: Course list
    post:
      summary: Create course. Admin or instructor.
      responses:
        "201":
          description: Created course
  /courses/{id}/classes:
    get:
      summary: List classes for a course.
      responses:
        "200":
          description: Class list
    post:
      summary: Create class for a course.
      responses:
        "201":
          description: Created class
  /assignments:
    get:
      summary: List assignments visible to the user.
      responses:
        "200":
          description: Assignment list
    post:
      summary: Create assignment and notify students.
      responses:
        "201":
          description: Created assignment
  /assignments/submissions:
    get:
      summary: List submissions.
      responses:
        "200":
          description: Submission list
    post:
      summary: Upload assignment submission.
      responses:
        "201":
          description: Created submission
  /attendance:
    get:
      summary: List attendance records.
      responses:
        "200":
          description: Attendance list
    post:
      summary: Create or update attendance record.
      responses:
        "201":
          description: Saved attendance
  /notifications:
    get:
      summary: List notifications.
      responses:
        "200":
          description: Notification list
    post:
      summary: Send realtime notification.
      responses:
        "201":
          description: Created notification
  /reports/dashboard:
    get:
      summary: Dashboard totals and analytics.
      responses:
        "200":
          description: Dashboard analytics
  /reports/attendance:
    get:
      summary: Attendance report.
      responses:
        "200":
          description: Attendance report
  /reports/performance:
    get:
      summary: Student performance report.
      responses:
        "200":
          description: Performance report
  /search:
    get:
      summary: Search SQL and MongoDB resources.
      responses:
        "200":
          description: Search results
  /cms/lessons:
    get:
      summary: List dynamic lessons.
      responses:
        "200":
          description: Lesson list
    post:
      summary: Create dynamic lesson content.
      responses:
        "201":
          description: Created lesson
  /cms/announcements:
    get:
      summary: List announcements.
      responses:
        "200":
          description: Announcement list
    post:
      summary: Create announcement.
      responses:
        "201":
          description: Created announcement
  /recommendations:
    get:
      summary: Recommend lessons based on weak performance.
      responses:
        "200":
          description: Recommendations
  /exports/{entity}:
    get:
      summary: Export students, instructors, courses, attendance, or performance as CSV, JSON, or XLSX.
      responses:
        "200":
          description: Export file or JSON payload
  /imports/students:
    post:
      summary: Import students from CSV/XLSX.
      responses:
        "201":
          description: Imported students

